<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>aACE Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f2f1;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 16px;
    }
    .card {
      background: white; border-radius: 8px;
      padding: 32px 40px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 360px; width: 90%;
    }
    .logo { font-size: 32px; margin-bottom: 12px; }
    h2 { font-size: 18px; color: #323130; font-weight: 600; margin-bottom: 6px; }
    p  { font-size: 13px; color: #605e5c; margin-bottom: 20px; }
    .btn {
      display: inline-block; padding: 9px 24px;
      background: #0078d4; color: white;
      border: none; border-radius: 4px;
      font-size: 14px; font-weight: 500;
      cursor: pointer; text-decoration: none;
    }
    .btn:hover { background: #106ebe; }
    .module-tag {
      display: inline-block; padding: 2px 10px;
      background: #e1dfdd; border-radius: 12px;
      font-size: 12px; color: #323130; margin-bottom: 16px;
    }
    #status { font-size: 12px; color: #605e5c; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📊</div>
    <h2>Abriendo en aACE...</h2>
    <div id="module-tag" class="module-tag">Companies</div>
    <p id="description">Redirigiendo a FileMaker automáticamente.</p>
    <a id="btn-manual" class="btn" href="#">Abrir manualmente</a>
    <div id="status">Si no abre automáticamente, usa el botón.</div>
  </div>

  <script>
    var FM_FILE = "aACE6";
    var DB_HOST = "aacedev.aacesoft.net";

    var MODULE_SCRIPTS = {
      COM: "FROM MENU: Execute Menu Option (ModuleAbbr,MenuOptionName)",
      ORD: "FROM MENU: Execute Menu Option (ModuleAbbr,MenuOptionName)",
      CON: "FROM MENU: Execute Menu Option (ModuleAbbr,MenuOptionName)"
    };

    var params = new URLSearchParams(window.location.search);
    var module = params.get("module") || "COM";
    var id     = params.get("id")     || "";
    var name   = params.get("name")   || "";
    var value  = params.get("value")  || "";

    var moduleLabel = module === "COM" ? "Companies" :
                      module === "ORD" ? "Orders" :
                      module === "CON" ? "Contacts" : module;

    document.getElementById("module-tag").textContent = moduleLabel;

    if (name || value) {
      document.getElementById("description").textContent =
        "Navegando a: " + (name || value);
    }

    var scriptParam = '{"modulecode":"' + module + '"';
    if (id)    scriptParam += ',"recordId":"'    + id    + '"';
    if (name)  scriptParam += ',"searchValue":"' + name  + '"';
    if (value) scriptParam += ',"searchValue":"' + value + '"';
    scriptParam += '}';

    var scriptName = encodeURIComponent(MODULE_SCRIPTS[module] || MODULE_SCRIPTS.COM);
    var param      = encodeURIComponent(scriptParam);
    var fmpURL     = "fmp://aacedev.aacesoft.net/" + FM_FILE
                   + "?script=" + scriptName
                   + "&param="  + param;

    document.getElementById("btn-manual").href = fmpURL;

    setTimeout(function() {
      window.location.href = fmpURL;
    }, 1500);
  </script>
</body>
</html>
