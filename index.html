<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Power BI Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f2f1;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }

    #login-screen img {
      width: 48px;
      height: 48px;
    }

    #login-screen h2 {
      font-size: 20px;
      color: #323130;
      font-weight: 600;
    }

    #login-screen p {
      font-size: 14px;
      color: #605e5c;
    }

    #btn-login {
      background: #0078d4;
      color: white;
      border: none;
      padding: 10px 28px;
      font-size: 15px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }

    #btn-login:hover {
      background: #106ebe;
    }

    #report-container {
      display: none;
      flex: 1;
      width: 100%;
      height: 100vh;
    }

    #report-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      color: #605e5c;
      font-size: 14px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e1dfdd;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="8" fill="#F2C811"/>
      <path d="M14 34V14h8l4 8 4-8h8v20h-5V22l-7 12-7-12v12H14z" fill="#1a1a1a"/>
    </svg>
    <h2>Power BI Dashboard</h2>
    <p>Inicia sesión con tu cuenta Microsoft para ver el reporte</p>
    <button id="btn-login" onclick="openLogin()">Iniciar sesión</button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <span>Cargando reporte...</span>
  </div>

  <!-- Report -->
  <div id="report-container">
    <iframe
      id="pbi-frame"
      src=""
      allowfullscreen="true">
    </iframe>
  </div>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────
    const REPORT_URL = "https://app.powerbi.com/reportEmbed?reportId=878a9a0a-079f-4813-b730-99d9ef4b1e42&groupId=me&ctid=52ccb498-ebae-48e6-b328-8c9120c836d5&autoAuth=true";
    const LOGIN_URL  = "https://login.microsoftonline.com/52ccb498-ebae-48e6-b328-8c9120c836d5/oauth2/v2.0/authorize"
                     + "?client_id=00000009-0000-0000-c000-000000000000"
                     + "&response_type=token"
                     + "&scope=https://analysis.windows.net/powerbi/api/Report.Read.All"
                     + "&redirect_uri=" + encodeURIComponent(window.location.href)
                     + "&response_mode=fragment"
                     + "&prompt=select_account";
    // ────────────────────────────────────────────────────────────────

    function openLogin() {
      // Redirect this same page to Microsoft login
      window.location.href = LOGIN_URL;
    }

    function showReport() {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("loading").style.display = "flex";

      const frame = document.getElementById("pbi-frame");
      frame.src = REPORT_URL;

      frame.onload = function () {
        document.getElementById("loading").style.display = "none";
        document.getElementById("report-container").style.display = "flex";
      };
    }

    // Check if returning from Microsoft login (token in URL fragment)
    function checkAuth() {
      const hash = window.location.hash;
      if (hash && hash.includes("access_token")) {
        // Store token flag in sessionStorage
        sessionStorage.setItem("pbi_authed", "true");
        // Clean URL
        history.replaceState(null, "", window.location.pathname);
        showReport();
      } else if (sessionStorage.getItem("pbi_authed") === "true") {
        // Already authenticated this session
        showReport();
      }
      // else: show login screen (default)
    }

    checkAuth();
  </script>

</body>
</html>
